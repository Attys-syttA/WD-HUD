name: Build Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore .\WD-HUD.sln

      - name: Build
        run: dotnet build .\WD-HUD.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test .\WD-HUD.sln --configuration Release --no-build
