name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitguardian:
    runs-on: ubuntu-latest
    env:
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ggshield
        if: ${{ env.GITGUARDIAN_API_KEY != '' }}
        run: python -m pip install --upgrade ggshield

      - name: Run GitGuardian secret scan
        if: ${{ env.GITGUARDIAN_API_KEY != '' }}
        run: ggshield secret scan path --recursive --yes --use-gitignore .

      - name: Explain skipped GitGuardian scan
        if: ${{ env.GITGUARDIAN_API_KEY == '' }}
        run: |
          echo "GitGuardian scan skipped because GITGUARDIAN_API_KEY is not configured."
          echo "Local equivalent: ggshield secret scan path --recursive --yes --use-gitignore ."
